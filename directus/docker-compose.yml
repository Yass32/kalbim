# Self-hosted Directus for the KALBİM site (Postgres + Directus).
# Usage:  docker compose up -d   (run from this directory)
# Put the values below in a .env file next to this compose file (see .env.example).

services:
  database:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', '${DB_USER}', '-d', '${DB_DATABASE}']
      interval: 10s
      timeout: 5s
      retries: 5

  directus:
    image: directus/directus:11
    restart: unless-stopped
    ports:
      - '8055:8055'
    volumes:
      - uploads:/directus/uploads
      - extensions:/directus/extensions
    depends_on:
      database:
        condition: service_healthy
    environment:
      KEY: ${DIRECTUS_KEY}
      SECRET: ${DIRECTUS_SECRET}
      PUBLIC_URL: ${PUBLIC_URL}

      DB_CLIENT: pg
      DB_HOST: database
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}

      # Allow the Next.js site to call the API from the browser if needed.
      CORS_ENABLED: 'true'
      CORS_ORIGIN: ${CORS_ORIGIN}

      # Cache (optional but recommended in production)
      CACHE_ENABLED: 'true'
      CACHE_AUTO_PURGE: 'true'

volumes:
  db_data:
  uploads:
  extensions:
